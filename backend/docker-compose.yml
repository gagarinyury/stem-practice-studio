services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./_data/redis:/data
    command: ["redis-server", "--appendonly", "yes"]

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      RUNS_DIR: /srv/apps/stem-practice-studio/runs
      API_PORT: "8090"
      PYTHONPATH: /srv/apps/stem-practice-studio
      CORS_ORIGINS: "http://localhost:4323,http://evox2:4323,http://evo:4323"
    # Repo mounted at the SAME absolute path as on host. Both api and worker
    # use this path so subprocess `docker run -v /srv/apps/...:/...` calls
    # made by the worker reference real host paths (sibling-container `-v`
    # flags are interpreted by the host docker daemon, not the container).
    volumes:
      - /srv/apps/stem-practice-studio:/srv/apps/stem-practice-studio
    working_dir: /srv/apps/stem-practice-studio
    ports:
      - "0.0.0.0:8090:8090"
    command: ["uvicorn", "backend.app.main:app", "--host", "0.0.0.0", "--port", "8090"]

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
    # Reads optional secrets from backend/.env (gitignored). Currently
    # only ACOUSTID_API_KEY is expected — sign up at
    # https://acoustid.org/new-application to get one.
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      RUNS_DIR: /srv/apps/stem-practice-studio/runs
      PYTHONPATH: /srv/apps/stem-practice-studio
      ACOUSTID_API_KEY: ${ACOUSTID_API_KEY:-}
    # docker-out-of-docker: pipeline modules shell out to `docker run` on the
    # host (htdemucs_6s, gigaam, parakeet, yt-dlp). Mount the socket so
    # sibling containers can be created. Repo and runs are mounted RW at the
    # host path so the worker can write outputs and the paths it passes to
    # sibling containers point at real host directories.
    volumes:
      - /srv/apps/stem-practice-studio:/srv/apps/stem-practice-studio
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /srv/apps/stem-practice-studio
    command: ["arq", "backend.app.jobs.WorkerSettings"]
