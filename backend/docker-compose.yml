services:
  asr:
    image: stem-practice-asr:rocm
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "991"
      - "44"
    volumes:
      - /srv/apps/stem-practice-studio:/srv/apps/stem-practice-studio
      - /srv/models/stem-practice-asr:/asr-models
    working_dir: /srv/apps/stem-practice-studio
    ports:
      - "0.0.0.0:${ASR_PORT:-8091}:${ASR_PORT:-8091}"
    command: ["python", "-m", "uvicorn", "bench.asr.server:app", "--host", "0.0.0.0", "--port", "${ASR_PORT:-8091}"]

  separator:
    image: stem-practice-bench:rocm
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "991"
      - "44"
    volumes:
      - /srv/apps/stem-practice-studio:/srv/apps/stem-practice-studio
      - /srv/models/stem-practice:/models:ro
    working_dir: /srv/apps/stem-practice-studio
    ports:
      - "0.0.0.0:${SEPARATOR_PORT:-8092}:${SEPARATOR_PORT:-8092}"
    command: ["python", "-m", "uvicorn", "bench.separate.server:app", "--host", "0.0.0.0", "--port", "${SEPARATOR_PORT:-8092}"]

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - asr
      - separator
    environment:
      RUNS_DIR: "${RUNS_DIR:-/srv/apps/stem-practice-studio/runs}"
      PYTHONPATH: /srv/apps/stem-practice-studio
      ASR_URL: "http://asr:${ASR_PORT:-8091}"
      SEPARATOR_URL: "http://separator:${SEPARATOR_PORT:-8092}"
      LLM_BASE_URL: "http://host.docker.internal:${LLM_PORT:-8080}/v1"
      LLM_MODEL: "${LLM_MODEL:-Qwen3-30B-Instruct (Q4_K_XL, 17gb)}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:4324,http://evox2:4324,http://evo:4324}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /srv/apps/stem-practice-studio:/srv/apps/stem-practice-studio
    working_dir: /srv/apps/stem-practice-studio
    ports:
      - "0.0.0.0:${API_PORT:-8093}:${API_PORT:-8093}"
    command: ["uvicorn", "backend.app:app", "--host", "0.0.0.0", "--port", "${API_PORT:-8093}"]

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_BACKEND_ORIGIN: "http://api:${API_PORT:-8093}"
    ports:
      - "0.0.0.0:${WEB_PORT:-4324}:4324"
