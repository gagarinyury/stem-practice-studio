services:
  tg-web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    container_name: tg-web-1
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BACKEND_ORIGIN: "http://backend-api-1:8093"
    ports:
      - "0.0.0.0:4424:4324"
    networks:
      - backend_default

networks:
  backend_default:
    external: true
